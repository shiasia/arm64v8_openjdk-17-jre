name: Download Docker Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: '镜像名称'
        required: true
        default: 'eclipse-temurin:17-jre'  # 改为这个
      platform:
        description: '平台架构'
        required: true
        default: 'linux/arm64'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure Docker for China mirror
        run: |
          sudo mkdir -p /etc/docker
          echo '{
            "registry-mirrors": [
              "https://docker.nju.edu.cn",
              "https://docker.mirrors.sjtug.sjtu.edu.cn"
            ]
          }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || true
      
      - name: Pull image
        run: |
          echo "Pulling ${{ github.event.inputs.image }}"
          docker pull --platform ${{ github.event.inputs.platform }} ${{ github.event.inputs.image }}
      
      - name: Save image
        run: |
          docker save ${{ github.event.inputs.image }} | gzip > image.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
