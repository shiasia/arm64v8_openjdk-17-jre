name: Download Docker Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: '镜像名称'
        required: true
        default: 'arm64v8/openjdk:17-jre'
      platform:
        description: '平台架构'
        required: true
        default: 'linux/arm64'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            image=moby/buildkit:latest
      
      - name: Configure Docker for China mirror
        run: |
          # 配置国内镜像加速（重要！）
          sudo mkdir -p /etc/docker
          echo '{
            "registry-mirrors": [
              "https://docker.nju.edu.cn",
              "https://docker.mirrors.sjtug.sjtu.edu.cn"
            ]
          }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || true
      
      - name: Pull image
        run: |
          echo "Pulling ${{ github.event.inputs.image }} for platform ${{ github.event.inputs.platform }}"
          docker pull --platform ${{ github.event.inputs.platform }} ${{ github.event.inputs.image }}
          if [ $? -ne 0 ]; then
            echo "Pull failed, retrying with different mirror..."
            docker pull --platform ${{ github.event.inputs.platform }} ${{ github.event.inputs.image }}
          fi
      
      - name: Save image
        run: |
          docker save ${{ github.event.inputs.image }} | gzip > image.tar.gz
          ls -lh image.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.event.inputs.image }}
          path: image.tar.gz
          retention-days: 7
          if-no-files-found: error
